name: Publish to PyPI

# Token-only publish (no Trusted Publishing / OIDC).
# Requires repository secret: PYPI_API_TOKEN
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  # NOTE: do NOT set id-token: write — avoids accidental OIDC Trusted Publishing.

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/puenteo/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install -U pip build
          python -m build

      - name: Require PyPI token secret
        env:
          TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::PYPI_API_TOKEN secret is empty. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "PYPI_API_TOKEN is set (length ${#TOKEN})"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
          verbose: true
