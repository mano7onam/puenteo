name: Publish to PyPI

# Requires repo secret: PYPI_API_TOKEN (pypi-… from pypi.org)
# environment: pypi → shows under GitHub Deployments (green when success)
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/puenteo/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install -U pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
